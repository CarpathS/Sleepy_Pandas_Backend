services:
  db:
    image: mysql:8.0
    container_name: sleepy_panda_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    command: ["mysqld", "--log-bin-trust-function-creators=1"]
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: sleepy_panda_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER}:${DB_PASS}@db:${DB_PORT:-3306}/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: sleepy_panda_phpmyadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PMA_HOST: db
      PMA_PORT: ${DB_PORT:-3306}
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
